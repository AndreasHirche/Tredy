<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Tredy – Fashion Store</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%23c0357a'/><text x='32' y='44' font-family='serif' font-size='30' fill='%23fff' text-anchor='middle'>👗</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#e83e8c;--rose:#f9c;--gold:#f0c040;--cream:#fff8f0;
  --floor:#c8a87a;--wall:#f5e8d0;--rack1:#e74c3c;--rack2:#2980b9;
  --rack3:#27ae60;--rack4:#8e44ad;
}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a14;font-family:'Georgia',serif}
canvas{display:block;touch-action:none}
#ui{position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px;background:rgba(20,0,15,0.82);pointer-events:none}
#ui button,#ui a{pointer-events:all}
#ui-level{position:absolute;left:50%;transform:translateX(-50%);pointer-events:none}
#ui-score{color:var(--gold);font-size:1.1rem;font-weight:700;text-shadow:0 0 8px var(--gold)}
#ui-msg{color:#f9e;font-size:0.78rem;text-align:center;flex:1;padding:0 10px;
  min-height:1.2em;text-shadow:0 0 6px #e83e8c}
#ui-level{color:#b9f;font-size:0.85rem;font-weight:600}

/* tap hint */
#tap-hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,180,220,0.6);font-size:0.72rem;pointer-events:none}

/* Splash / overlay */
#splash{position:fixed;inset:0;z-index:50;
  background:linear-gradient(160deg,#1a0a14 0%,#2d1035 50%,#1a0a14 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;color:var(--cream);text-align:center;padding:24px}
#splash h1{font-size:clamp(2rem,7vw,3.4rem);color:var(--gold);
  text-shadow:0 0 20px var(--gold),0 0 40px rgba(240,192,64,0.4)}
#splash p{font-size:0.9rem;color:#e8c8d8;max-width:360px;line-height:1.6}
#splash button{padding:14px 36px;border-radius:30px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--pink),#a02060);color:#fff;
  font-size:1rem;font-weight:700;font-family:inherit;
  box-shadow:0 0 24px rgba(232,62,140,0.5);transition:all 0.2s}
#splash button:hover{transform:scale(1.05)}
.star{position:absolute;animation:twinkle 2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
</style>
</head>
<body>

<div id="splash">
  <div class="star" style="top:8%;left:12%;font-size:1.4rem;animation-delay:0s">✨</div>
  <div class="star" style="top:15%;right:10%;font-size:1rem;animation-delay:0.4s">⭐</div>
  <div class="star" style="bottom:20%;left:8%;font-size:0.9rem;animation-delay:0.8s">✨</div>
  <div class="star" style="bottom:30%;right:14%;font-size:1.2rem;animation-delay:1.2s">⭐</div>
  <h1>✨ Tredy ✨</h1>
  <p>Du bist <b style='color:#f0c040'>Tiffany</b>, Verkäuferin im schönsten Modeladen der Stadt! Tippe auf alles was Aufmerksamkeit braucht – Tiffany kümmert sich!</p>
  <div style="font-size:0.8rem;color:#c8a0b8;line-height:1.8">
👆 Tippe auf Kunden, Kleidung, Pakete – Tiffany erledigt den Rest!
  </div>
  <button id="btn-start">Los geht's Tiffany! 🛍️</button>
</div>

<div id="ui">
  <span id="ui-score">💶 0€</span>
  <span id="ui-msg"></span>
  <span id="ui-level">Level 1</span>
  <button id="btn-pause" onclick="togglePause()" style="color:#f9c;font-size:.85rem;font-weight:700;cursor:pointer;padding:3px 10px;border:1px solid rgba(255,200,230,0.3);border-radius:6px;background:rgba(80,0,120,0.3);white-space:nowrap;font-family:inherit" title="Pause / Weiter">Pause</button>
  <button onclick="quitGame()" style="color:#f9c;font-size:.85rem;font-weight:700;cursor:pointer;padding:3px 10px;border:1px solid rgba(255,200,230,0.3);border-radius:6px;background:rgba(200,0,80,0.2);white-space:nowrap;font-family:inherit" title="Beenden">Beenden</button>
</div>
<canvas id="c"></canvas>
<div id="tap-hint">👆 Tippe auf alles was Aufmerksamkeit braucht</div>

<script>
'use strict';
// ── Canvas setup ─────────────────────────────────────────────────────────────
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W,H,SCALE=1;
const DESIGN_W=800,DESIGN_H=500;

function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const landscape=vw>vh;
  if(landscape){
    // Scale to fill full width exactly
    SCALE=vw/DESIGN_W;
    const scaledH=DESIGN_H*SCALE;
    cv.width=Math.round(DESIGN_W*SCALE);
    cv.height=Math.round(scaledH);
    // If canvas is taller than viewport, shift it up so bottom 80% is visible
    // (the action is in the lower portion of the game)
    const overflow=scaledH-vh;
    const shift=overflow>0?Math.round(overflow*0.75):0; // show lower 75% of canvas
    cv.style.cssText='display:block;width:'+cv.width+'px;height:'+cv.height+'px;margin:0;padding:0;position:relative;top:-'+shift+'px;';
  } else {
    SCALE=Math.min(vw/DESIGN_W,vh/DESIGN_H);
    cv.width=Math.round(DESIGN_W*SCALE);
    cv.height=Math.round(DESIGN_H*SCALE);
    cv.style.cssText='display:block;width:'+cv.width+'px;height:'+cv.height+'px;margin:auto;';
  }
  const ui=document.getElementById('ui');
  if(ui) ui.style.background='rgba(20,0,15,0.75)';
  W=DESIGN_W;H=DESIGN_H;
}
window.addEventListener('resize',resize);
resize();

// ── Game state ───────────────────────────────────────────────────────────────
const ST={SPLASH:'splash',PLAY:'play',OVER:'over'};
let state=ST.SPLASH,score=0,level=1,frame=0,shakeT=0,paused=false;
let scorePopups=[];
let msgText='',msgTimer=0;

function msg(t,dur=180){msgText=t;msgTimer=dur;}
function uiMsg(t){document.getElementById('ui-msg').textContent=t;}
function uiScore(){document.getElementById('ui-score').textContent='💶 '+score+'€';}
function uiLevel(){document.getElementById('ui-level').textContent='Level '+level;}

// ── Layout constants ──────────────────────────────────────────────────────────
const FLOOR_Y=H-90;          // floor surface
const MIA_W=28,MIA_H=56;
const RACK_Y=FLOOR_Y-120;     // top of clothing rack
const RACK_H=100;
const RACK_W=90;
// X positions
const DRESSING_X=40;          // dressing room left wall
const RACK1_X=150;            // rack positions (centre)
const RACK2_X=270;
const COUNTER_X=400;          // counter centre
const RACK3_X=530;
const RACK4_X=650;
const DOOR_X=750;             // glass door

// 4 rack colours
const RACK_COLS=['#e74c3c','#2980b9','#27ae60','#8e44ad'];
const RACK_NAMES=['Rot','Blau','Grün','Lila'];
const RACK_XS=[RACK1_X,RACK2_X,RACK3_X,RACK4_X];

// ── Clothing items ────────────────────────────────────────────────────────────
// Each item has { id, rack (0-3), x, y, hanging:bool, carriedBy, misplaced }
let items=[];
let nextItemId=0;
function makeItem(rack,x,y){
  const _c=RACK_COLS[rack];
  return{id:nextItemId++,rack,x,y,col:_c,origCol:_c,hanging:true,carriedBy:null,misplaced:false};
}
function initItems(){
  items=[];
  for(let r=0;r<4;r++){
    for(let i=0;i<4;i++){
      items.push(makeItem(r,RACK_XS[r]+(i-1.5)*16,RACK_Y+10));
    }
  }
}

// ── Mia (player) ─────────────────────────────────────────────────────────────
const mia={
  x:COUNTER_X,y:FLOOR_Y,vx:0,
  speed:2.8,dir:1,
  carrying:[],   // item ids
  maxCarry:3,
  talking:null,  // actor id
  talkTimer:0,
  blinkT:0,animT:0
};

// ── Actors ───────────────────────────────────────────────────────────────────
let actors=[];
let nextActorId=0;
const ACT={
  WEIBERGRUPPE:'weibergruppe',
  STAMMKUNDIN:'stammkundin',
  POSTBOTE:'postbote',
  MANAGEMENT:'management'
};

// Spawn timers
let spawnTimer=500,spawnMin=400,spawnMax=700;

// ── Packages ─────────────────────────────────────────────────────────────────
let packages=[];  // {x,y,rack,items:[item ids],opened:bool}

// ── Spawn logic ───────────────────────────────────────────────────────────────
function spawnActor(){
  const types=[ACT.WEIBERGRUPPE,ACT.STAMMKUNDIN,ACT.STAMMKUNDIN,ACT.POSTBOTE,ACT.MANAGEMENT];
  const t=types[Math.floor(Math.random()*types.length)];
  const fromRight=Math.random()>0.4;
  const x=fromRight?DOOR_X+20:-30;
  const dir=fromRight?-1:1;

  const STAMM_NAMES=['Brigitte','Karin','Uschi'];
  const STAMM_COLS=['#e8a0b0','#a0c8e8','#c8e8a0'];
  const STAMM_LIKES=[0,1,2];

  if(t===ACT.WEIBERGRUPPE){
    actors.push({id:nextActorId++,type:t,x,y:FLOOR_Y,dir,speed:1.4,
      state:'enter',timer:0,phase:0,
      members:[{dx:-22},{dx:0},{dx:22}],
      chaosCooldown:0,label:'👩‍👩‍👧'});
  } else if(t===ACT.STAMMKUNDIN){
    const si=Math.floor(Math.random()*3);
    actors.push({id:nextActorId++,type:t,x,y:FLOOR_Y,dir,speed:1.6,
      state:'browsing',timer:0,phase:0,
      name:STAMM_NAMES[si],col:STAMM_COLS[si],
      prefRack:STAMM_LIKES[si],
      items:[],maxItems:3+Math.floor(Math.random()*3),
      waitAtCounter:0,label:'👩'});soundDingDong();
  } else if(t===ACT.POSTBOTE){
    actors.push({id:nextActorId++,type:t,x:-40,y:FLOOR_Y,dir:1,speed:1.2,
      state:'enter',timer:0,phase:0,
      pkgCount:1,
      delivered:false,label:'📦',
      happy:false,helpTimer:0});soundDingDong();
  } else if(t===ACT.MANAGEMENT){
    actors.push({id:nextActorId++,type:t,x:DOOR_X+30,y:FLOOR_Y,dir:-1,speed:1.0,
      state:'enter',timer:0,phase:0,
      inspecting:false,inspectTimer:0,label:'👔'});soundDingDong();
  }
}

// ── Tap-to-direct ────────────────────────────────────────────────────────────
let tiffTarget=null;
let tapRipples=[];

function screenToGame(cx2,cy2){
  const rect=cv.getBoundingClientRect();
  return{x:(cx2-rect.left)/SCALE, y:(cy2-rect.top)/SCALE};
}

function handleTap(clientX,clientY){
  if(paused&&state===ST.PLAY){paused=false;document.getElementById('btn-pause').textContent='Pause';startMusic();return;}
  if(state!==ST.PLAY)return;
  const g=screenToGame(clientX,clientY);
  tapRipples.push({x:g.x,y:g.y,t:0});
  const gx=g.x;

  // Check if Tiffany is currently carrying an item
  const carried=items.find(i=>i.carriedBy==='mia');

  // If carrying: tapping a rack always hangs the item there
  if(carried){
    for(let r=0;r<4;r++){
      if(Math.abs(gx-RACK_XS[r])<55){
        const rackIdx=r;
        tiffTarget={x:RACK_XS[r],lbl:'👗 Einhängen…',action:()=>hangItemOnRack(carried,rackIdx)};
        return;
      }
    }
  }

  // 1. Waiting customer at counter
  for(const a of actors){
    if(a.type===ACT.STAMMKUNDIN&&a.state==='waiting'&&Math.abs(gx-a.x)<55){
      tiffTarget={x:COUNTER_X,lbl:'💳 Zur Kasse…',action:()=>payCustomer(a)};return;
    }
  }
  // 2. Any actor – talk
  for(const a of actors){
    if(Math.abs(gx-a.x)<50){
      tiffTarget={x:a.x,lbl:'💬 Gehe hin…',action:()=>{mia.talking=a.id;mia.talkTimer=180;onTalk(a);}};return;
    }
  }
  // 3. Unopened package
  for(const pkg of packages){
    if(!pkg.opened&&Math.abs(gx-pkg.x)<45){
      tiffTarget={x:pkg.x,lbl:'📦 Auspacken…',action:()=>openPackage(pkg)};return;
    }
  }
  // 4. Floor item (not hanging) → auto-sort
  for(const item of items){
    if(item.carriedBy!=null||item.hanging)continue;  // only floor items here
    if(Math.abs(gx-item.x)<40){
      const dest=item.rack;
      tiffTarget={x:item.x,lbl:'👗 Einsortieren…',action:()=>pickAndSort(item,dest)};return;
    }
  }
  // 5. Rack tap: pick nearest misplaced item to tap point
  for(let r=0;r<4;r++){
    if(Math.abs(gx-RACK_XS[r])<60){
      const bad=items.filter(i=>i.hanging&&i.misplaced&&Math.abs(i.x-RACK_XS[r])<80);
      if(bad.length>0){
        // Sort by distance to TAP point so user gets what they aimed at
        bad.sort((a,b)=>Math.abs(a.x-gx)-Math.abs(b.x-gx));
        const target=bad[0];
        tiffTarget={x:RACK_XS[r],lbl:'👗 Sortieren…',
          action:()=>pickAndSort(target,target.rack)};
        return;
      }
    }
  }
  // Default: walk
  tiffTarget={x:gx,lbl:null,action:null};
}

cv.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
cv.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];handleTap(t.clientX,t.clientY);},{passive:false});

document.addEventListener('touchstart',function fs(){
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen({navigationUI:'hide'}).catch(()=>{});
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  document.removeEventListener('touchstart',fs);
},{once:true,passive:true});

// ── Action helpers ────────────────────────────────────────────────────────────
function nearX(ax,bx,d){return Math.abs(ax-bx)<d;}

function hangItemOnRack(item,rackIndex){
  item.hanging=true;item.carriedBy=null;
  item.x=RACK_XS[rackIndex]+(Math.random()-0.5)*40;
  item.y=RACK_Y+10;
  item.misplaced=(item.rack!==rackIndex);
  // item.rack never changes — it always means 'correct rack'
  if(!item.misplaced){score+=5;uiScore();msg('✅ Richtig einsortiert! +5',70);}
  else{msg('⚠️ Falsche Stange – kommt falsch hin!',90);}
}

function payCustomer(a){
  if(a.state!=='waiting')return;
  const rev=a.items.length*15;score+=rev;uiScore();
  addScorePopup(COUNTER_X,mia.y-50,rev);soundKaChing();
  msg('💳 '+a.name+' zahlt '+rev+'€! Super Tiffany!',180);
  a.items.forEach(iid=>{const idx=items.findIndex(i=>i.id===iid);if(idx>=0)items.splice(idx,1);});
  const soldCount=a.items.length;
  a.items=[]; // clear immediately so nothing draws over shoulder
  // Restock after delay — spawn directly on rack, no flying animation
  const restockCount=soldCount;
  setTimeout(()=>{
    for(let n=0;n<restockCount;n++){
      const r=Math.floor(Math.random()*4);
      // Spread items along rack so they don't overlap existing ones
      const existingOnRack=items.filter(i=>i.hanging&&i.rack===r).length;
      const offsetX=(existingOnRack+n-(4/2))*18;
      const ni=makeItem(r, RACK_XS[r]+offsetX, RACK_Y+10);
      ni.newItem=true; // flash briefly
      items.push(ni);
    }
  },2000);
  a.state='leave';a.timer=0;
}

function openPackage(pkg){
  if(pkg.opened)return;
  pkg.opened=true;
  for(const iid of pkg.items){
    const item=items.find(i=>i.id===iid);
    if(item){item.x=pkg.x+(Math.random()-0.5)*50;item.y=FLOOR_Y-15;item.hanging=false;item.carriedBy=null;if(!item.col)item.col=RACK_COLS[item.rack];}
  }
  msg('📦 Paket ausgepackt! Tippe auf die Kleidung um sie einzusortieren.',110);
}

function pickAndSort(item,destRack){
  if(item.carriedBy!=null)return;
  item.hanging=false;
  if(!item.col)item.col=RACK_COLS[item.rack]; // ensure col set
  item.carriedBy='mia';
  const rx=RACK_XS[destRack];
  tiffTarget={x:rx,lbl:'👗 Einhängen…',action:()=>{
    item.hanging=true;item.carriedBy=null;item.misplaced=false;
    item.x=RACK_XS[destRack]+(Math.random()-0.5)*40;item.y=RACK_Y+10;
    score+=5;uiScore();msg('✅ Einsortiert! +5',70);
  }};
}

function sortOne(r){
  // Pick the misplaced item NEAREST to Tiffany's current position
  const bad=items.filter(i=>i.hanging&&i.misplaced&&Math.abs(i.x-RACK_XS[r])<80);
  if(!bad.length){msg('✅ Alles korrekt sortiert!',70);return;}
  const nearest=bad.sort((a,b)=>Math.abs(a.x-mia.x)-Math.abs(b.x-mia.x))[0];
  pickAndSort(nearest,nearest.rack);
}

// ── Action logic ──────────────────────────────────────────────────────────────

function onTalk(a){
  if(a.type===ACT.STAMMKUNDIN){
    msg(`💬 "${a.name}: Oh, ich nehme das und das!"`,120);
    if(a.state==='browsing'){a.state='goingToDress';}
  } else if(a.type===ACT.WEIBERGRUPPE){
    msg('🗣️ "Haha, schau mal das hier!" – etwas Ruhe kehrt ein',120);
    a.chaosCooldown=300;
  } else if(a.type===ACT.POSTBOTE){
    msg('📦 Syrischer Postbote: "Salamu alaikum! Ich helfe gerne!"',150);
    a.happy=true;a.helpTimer=200;
  } else if(a.type===ACT.MANAGEMENT){
    msg('👔 Managerin: "Danke Tiffany! Strafe wird halbiert."',150);
    a.greeted=true;
  }
}

// ── Game update ───────────────────────────────────────────────────────────────
function countMisplaced(){
  let n=0;
  for(const item of items){
    if(item.hanging&&item.misplaced)n++;
  }
  return n;
}
function countUnopened(){return packages.filter(p=>!p.opened).length;}

function update(){
  frame++;
  if(shakeT>0)shakeT--;
  if(msgTimer>0)msgTimer--;
  else if(!msgText)uiMsg('');
  if(msgTimer===0&&msgText){uiMsg(msgText);msgText='';}

  // Tiffany walks to tap target
    if(tiffTarget){
    const tdx=tiffTarget.x-mia.x;
    if(Math.abs(tdx)>4){
      mia.x+=Math.sign(tdx)*mia.speed;
      mia.dir=Math.sign(tdx);
      mia.animT=frame;
    } else {
      if(tiffTarget.action){tiffTarget.action();}
      tiffTarget=null;
    }
  }
  mia.x=Math.max(20,Math.min(W-20,mia.x));
  mia.blinkT++;
  // tap ripple update
  for(let ri=tapRipples.length-1;ri>=0;ri--){tapRipples[ri].t++;if(tapRipples[ri].t>28)tapRipples.splice(ri,1);}

  // Talk timer
  if(mia.talkTimer>0){mia.talkTimer--;if(mia.talkTimer===0)mia.talking=null;}

  // Spawn
  spawnTimer--;
  // Max actors scales with level: start with 2, grow to 5
  const maxActors=Math.min(2+Math.floor(level/2),5);
  if(spawnTimer<=0&&actors.length<maxActors){
    spawnActor();
    spawnTimer=spawnMin+Math.floor(Math.random()*(spawnMax-spawnMin));
    // Get faster each level
    if(level>1)spawnTimer=Math.max(150,spawnTimer-level*30);
  }

  // Update actors
  for(let ai=actors.length-1;ai>=0;ai--){
    const a=actors[ai];
    updateActor(a);
    if(a.state==='done')actors.splice(ai,1);
  }

  // Level up
  if(score>level*150){level++;uiLevel();spawnMin=Math.max(150,spawnMin-25);msg(`⭐ Level ${level}!`,180);}
}

function updateActor(a){
  a.timer++;
  if(a.type===ACT.WEIBERGRUPPE) updateWeibergruppe(a);
  else if(a.type===ACT.STAMMKUNDIN) updateStammkundin(a);
  else if(a.type===ACT.POSTBOTE) updatePostbote(a);
  else if(a.type===ACT.MANAGEMENT) updateManagement(a);
}

function updateWeibergruppe(a){
  if(a.state==='enter'){
    a.x+=a.dir*a.speed;
    if(nearX(a.x,RACK1_X,30)||nearX(a.x,RACK2_X,30)){a.state='chaos';a.timer=0;}
  }
  if(a.state==='chaos'){
    if(a.chaosCooldown>0){a.chaosCooldown--;return;}
    // Walking to a wrong rack with an item
    if(a.chaosTarget){
      const dx=a.chaosTarget.destX-a.x;
      if(Math.abs(dx)>3){
        a.x+=Math.sign(dx)*a.speed*0.8;a.dir=Math.sign(dx);
      } else {
        // Arrived — hang item at wrong rack
        const itm=items.find(i=>i.id===a.chaosTarget.itemId);
        if(itm){
          itm.hanging=true;itm.carriedBy=null;
          itm.x=a.chaosTarget.destX+(Math.random()-0.5)*30;
          itm.y=RACK_Y+10;
          itm.misplaced=true;
        }
        a.chaosTarget=null;
        msg('👩‍👩‍👧 Kleidung falsch einsortiert!',90);
      }
    }
    // Every 100 frames, grab a new item and walk to wrong rack
    if(!a.chaosTarget&&a.timer%100===0){
      const rackItems=items.filter(i=>i.hanging&&!i.carriedBy&&
        (nearX(i.x,RACK1_X,70)||nearX(i.x,RACK2_X,70)||nearX(i.x,RACK3_X,70)||nearX(i.x,RACK4_X,70)));
      if(rackItems.length>0){
        const item=rackItems[Math.floor(Math.random()*rackItems.length)];
        item.hanging=false;item.carriedBy='weib';
        const wrongRack=(item.rack+1+Math.floor(Math.random()*3))%4;
        // Assign to a member
        if(!a.memberItems)a.memberItems=[null,null,null];
        const slot=(a.chaosItemCount||0)%3;
        a.memberItems[slot]=item.id;
        a.chaosItemCount=(a.chaosItemCount||0)+1;
        a.chaosTarget={itemId:item.id,destX:RACK_XS[wrongRack]};
      }
    }
    if(a.timer>480){
      // Drop any carried items before leaving
      if(a.memberItems){a.memberItems.forEach(iid=>{
        if(!iid)return;
        const itm=items.find(i=>i.id===iid&&i.carriedBy==='weib');
        if(itm){const r=itm.rack;itm.hanging=true;itm.carriedBy=null;itm.x=RACK_XS[r]+(Math.random()-0.5)*40;itm.y=RACK_Y+10;}
      });}
      a.state='leave';a.timer=0;
    }
  }
  if(a.state==='leave'){
    a.x+=1.5*(a.dir*-1);
    if(a.x<-60||a.x>W+60)a.state='done';
  }
}

function updateStammkundin(a){
  const targetRack=RACK_XS[a.prefRack];
  if(a.state==='browsing'){
    // Walk to preferred rack
    const dx=targetRack-a.x;
    if(Math.abs(dx)>5){a.x+=Math.sign(dx)*a.speed;a.dir=Math.sign(dx);}
    else{
      // Pick items
      if(a.timer%60===0&&a.items.length<a.maxItems){
        const avail=items.filter(i=>i.hanging&&i.carriedBy==null&&Math.abs(i.x-a.x)<80);
        if(avail.length>0){
          const item=avail[Math.floor(Math.random()*avail.length)];
          item.hanging=false;item.carriedBy=a.id;
          a.items.push(item.id);
          // Occasionally misplace one back
          if(Math.random()<0.2&&a.items.length>1){
            const putBack=a.items.splice(0,1)[0];
            const itm=items.find(i=>i.id===putBack);
            if(itm){
              // Move visually to wrong rack, keep itm.rack as correct destination
            const wrongR=(itm.rack+1)%4;
              itm.hanging=true;itm.carriedBy=null;
              itm.x=RACK_XS[wrongR]+(Math.random()-0.5)*30;
              itm.misplaced=true;
            }
          }
        }
      }
      if(a.items.length>=a.maxItems||(a.timer>300&&a.items.length>0)){
        a.state='goingToDress';a.timer=0;
        msg(`💃 ${a.name} geht in die Umkleidekabine!`,90);
      }
    }
  }
  if(a.state==='goingToDress'){
    const dx=DRESSING_X+30-a.x;
    if(Math.abs(dx)>5){a.x+=Math.sign(dx)*a.speed;a.dir=Math.sign(dx);}
    else{a.state='dressing';a.timer=0;}
  }
  if(a.state==='dressing'){
    if(a.timer>200){a.state='goingToCounter';a.timer=0;
      msg(`🛍️ ${a.name} kommt zur Kasse!`,90);}
  }
  if(a.state==='goingToCounter'){
    const dx=COUNTER_X-a.x;
    if(Math.abs(dx)>5){a.x+=Math.sign(dx)*a.speed;a.dir=Math.sign(dx);}
    else{a.state='waiting';a.waitAtCounter=0;a.timer=0;
      msg(`💳 ${a.name} wartet an der Kasse!`,120);}
  }
  if(a.state==='waiting'){
    a.waitAtCounter++;
    if(a.waitAtCounter>360){
      // Too long — leaves annoyed
      score=Math.max(0,score-20);uiScore();shakeT=20;
      msg(`😡 ${a.name} geht ohne zu kaufen!`,150);
      a.items.forEach(iid=>{
        const itm=items.find(i=>i.id===iid);
        if(itm){itm.hanging=true;itm.carriedBy=null;
          itm.x=RACK_XS[itm.rack]+(Math.random()-0.5)*40;itm.misplaced=Math.random()<0.4;}
      });
      a.state='leave';a.timer=0;
    }
  }
  if(a.state==='leave'){
    a.x+=2*(a.dir*-1);
    if(a.x<-60||a.x>W+60)a.state='done';
  }
}

function updatePostbote(a){
  if(a.state==='enter'){
    a.x+=a.dir*a.speed;
    if(a.x>120){a.state='deliver';a.timer=0;msg('📦 Postbote ist unterwegs!',90);soundDingDong();}
  }
  if(a.state==='deliver'){
    // Walk to counter
    const dx=COUNTER_X-30-a.x;
    if(Math.abs(dx)>5){a.x+=Math.sign(dx)*a.speed;a.dir=Math.sign(dx);}
    else{
      // Arrived at counter — NOW drop the package on the floor
      if(!a.delivered){
        a.delivered=true;
        const pkgItems=[];
        for(let n=0;n<2;n++){
          const r=Math.floor(Math.random()*4);
          const newItem=makeItem(r,COUNTER_X-40+(Math.random()-0.5)*30,FLOOR_Y-20);
          newItem.col=RACK_COLS[r];
          newItem.hanging=false;items.push(newItem);pkgItems.push(newItem.id);
        }
        packages.push({x:COUNTER_X-40,y:FLOOR_Y-10,items:pkgItems,opened:false});
        msg('📦 Paket abgestellt! Tippe zum Auspacken.',130);
      }
      a.state='waiting';a.timer=0;
    }
  }
  if(a.state==='waiting'){
    // If talked to and happy, he helps sort one item every 120 frames
    if(a.happy&&a.helpTimer>0){
      a.helpTimer--;
      if(a.timer%120===0){
        const bad=items.filter(i=>i.hanging&&i.misplaced);
        if(bad.length>0){
          const itm=bad[0];
          itm.misplaced=false;
          itm.x=RACK_XS[itm.rack]+(Math.random()-0.5)*30;
          msg('👨 Postbote hilft: Kleidung sortiert!',90);
          score+=3;uiScore();
        }
      }
    }
    if(a.timer>300){a.state='leave';a.timer=0;}
  }
  if(a.state==='leave'){
    a.x-=a.speed;
    if(a.x<-60)a.state='done';
  }
}

function updateManagement(a){
  if(a.state==='enter'){
    a.x+=a.dir*a.speed;
    if(a.x<W-100){a.state='inspect';a.timer=0;a.inspectTimer=0;
      msg('👔 Managerin betritt den Laden!',120);}
  }
  if(a.state==='inspect'){
    // Walk around
    const target=RACK_XS[Math.floor(a.inspectTimer/100)%4];
    const dx=target-a.x;
    if(Math.abs(dx)>5){a.x+=Math.sign(dx)*a.speed*0.8;a.dir=Math.sign(dx);}
    a.inspectTimer++;
    if(a.timer>400){
      // Final verdict
      const mis=countMisplaced();
      const unop=countUnopened();
      let penalty=0;
      const pf=a.greeted?0.5:1;
      if(mis>0){penalty+=Math.round(mis*10*pf);msg(`👔 "${mis} Kleidungsstücke falsch! –${mis*10} Punkte!"`,180);}
      if(unop>0){penalty+=Math.round(unop*15*pf);
        setTimeout(()=>msg(`👔 "${unop} Pakete noch zu! –${unop*15} Punkte!"`,180),60);}
      if(penalty===0){score+=30;uiScore();msg('👔 "Alles tadellos! +30 Bonus!"',180);}
      else{score=Math.max(0,score-penalty);uiScore();shakeT=30;}
      a.state='leave';a.timer=0;
    }
  }
  if(a.state==='leave'){
    a.x+=2;
    if(a.x>W+60)a.state='done';
  }
}

// ── Actionable test ───────────────────────────────────────────────────────────
function isActionable(gx){
  if(state!==ST.PLAY)return false;
  // Waiting customer at counter
  for(const a of actors){
    if(a.type===ACT.STAMMKUNDIN&&a.state==='waiting'&&Math.abs(gx-a.x)<55)return true;
  }
  // Any actor
  for(const a of actors){
    if(Math.abs(gx-a.x)<50)return true;
  }
  // Unopened package
  for(const pkg of packages){
    if(!pkg.opened&&Math.abs(gx-pkg.x)<45)return true;
  }
  // Floor item or misplaced hanging item
  for(const item of items){
    if(item.carriedBy!=null)continue;
    if(Math.abs(gx-item.x)<32)return true;
  }
  // Rack with misplaced items
  for(let r=0;r<4;r++){
    const bad=items.filter(i=>i.hanging&&i.misplaced&&Math.abs(i.x-RACK_XS[r])<80);
    if(bad.length>0&&Math.abs(gx-RACK_XS[r])<55)return true;
  }
  // Rack tap when carrying
  const carrying=items.find(i=>i.carriedBy==='mia');
  if(carrying){
    for(let r=0;r<4;r++){
      if(Math.abs(gx-RACK_XS[r])<55)return true;
    }
  }
  return false;
}

function drawGlowHalo(x,y,r){
  const pulse=0.55+0.45*Math.sin(frame*0.12);
  const grad=cx.createRadialGradient(x,y,0,x,y,r);
  grad.addColorStop(0,'rgba(255,200,60,'+(0.55*pulse)+')');
  grad.addColorStop(0.5,'rgba(255,160,20,'+(0.35*pulse)+')');
  grad.addColorStop(1,'rgba(255,140,0,0)');
  cx.save();
  cx.globalCompositeOperation='lighter';
  cx.fillStyle=grad;
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
  cx.restore();
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function draw(){
  cx.save();
  cx.scale(SCALE,SCALE);
  if(shakeT>0){
    cx.translate(Math.random()*4-2,Math.random()*4-2);
  }

  drawStore();
  drawItems();
  drawPackages();
  drawActors();
  drawMia();
  drawUI2D();
  if(paused&&state===ST.PLAY){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f9c';cx.font='bold 32px Georgia,serif';cx.textAlign='center';
    cx.fillText('⏸ PAUSE',W/2,H/2);
    cx.font='14px Georgia,serif';cx.fillStyle='#e8c8d8';
    cx.fillText('▶ Tippe zum Weiterspielen',W/2,H/2+36);
    cx.textAlign='left';
  }
  drawTapRipples();
  drawScorePopups();

  cx.restore();
}

function drawStore(){

  cx.strokeStyle='rgba(0,0,0,0.08)';cx.lineWidth=0.5;
  for(let x=0;x<W;x+=40){cx.beginPath();cx.moveTo(x,FLOOR_Y);cx.lineTo(x,H);cx.stroke();}
  for(let y=FLOOR_Y;y<H;y+=30){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}

  // ── Dressing room ──────────────────────────────────────────────────────────
  cx.fillStyle='#d4b8a0';cx.fillRect(DRESSING_X,FLOOR_Y-150,70,150);
  cx.fillStyle='rgba(0,0,0,0.1)';cx.fillRect(DRESSING_X,FLOOR_Y-150,4,150);

  cx.fillStyle='#c060a0';
  for(let i=0;i<3;i++){cx.fillRect(DRESSING_X+8+i*18,FLOOR_Y-138,14,134);}
  // Label
  cx.fillStyle='#800060';cx.font='bold 13px sans-serif';cx.textAlign='center';
  cx.fillText('Umkleide',DRESSING_X+35,FLOOR_Y-155);
  cx.textAlign='left';

  // ── Racks ──────────────────────────────────────────────────────────────────
  for(let r=0;r<4;r++){
    drawRack(RACK_XS[r],RACK_Y,RACK_COLS[r],RACK_NAMES[r]);
  }

  // ── Counter ────────────────────────────────────────────────────────────────
  cx.fillStyle='#8b4513';
  cx.fillRect(COUNTER_X-55,FLOOR_Y-55,110,55);
  cx.fillStyle='#a0522d';
  cx.fillRect(COUNTER_X-55,FLOOR_Y-65,110,14);
  // Counter top gloss

  cx.fillRect(COUNTER_X-53,FLOOR_Y-63,50,4);
  // Cash register
  cx.fillStyle='#1a1a1a';cx.fillRect(COUNTER_X+10,FLOOR_Y-80,30,24);
  cx.fillStyle='#2a9d2a';cx.fillRect(COUNTER_X+13,FLOOR_Y-78,24,14);
  cx.fillStyle='#333';cx.fillRect(COUNTER_X+10,FLOOR_Y-56,30,4);
  cx.fillStyle='white';cx.font='10px monospace';cx.textAlign='center';
  cx.fillText('KASSE',COUNTER_X+25,FLOOR_Y-66);cx.textAlign='left';


  // ── Glass door ─────────────────────────────────────────────────────────────
  cx.fillStyle='#8b6914';cx.fillRect(DOOR_X-5,FLOOR_Y-200,10,200);
  cx.fillStyle='rgba(160,220,255,0.4)';cx.fillRect(DOOR_X,FLOOR_Y-200,48,195);

  cx.strokeStyle='#8b6914';cx.lineWidth=3;
  cx.strokeRect(DOOR_X,FLOOR_Y-200,48,198);

  cx.beginPath();cx.moveTo(DOOR_X+24,FLOOR_Y-200);cx.lineTo(DOOR_X+24,FLOOR_Y-2);cx.stroke();

  cx.fillStyle='#c8a020';cx.beginPath();cx.arc(DOOR_X+8,FLOOR_Y-100,4,0,Math.PI*2);cx.fill();

function drawRack(x,y,col,name){
  // Pole
  cx.strokeStyle='#888';cx.lineWidth=4;
  cx.beginPath();cx.moveTo(x-RACK_W/2,y);cx.lineTo(x+RACK_W/2,y);cx.stroke();
  // Legs
  cx.strokeStyle='#666';cx.lineWidth=3;
  cx.beginPath();cx.moveTo(x-RACK_W/2+6,y);cx.lineTo(x-RACK_W/2+6,FLOOR_Y);cx.stroke();
  cx.beginPath();cx.moveTo(x+RACK_W/2-6,y);cx.lineTo(x+RACK_W/2-6,FLOOR_Y);cx.stroke();
  // Colour indicator band
  cx.fillStyle=col;cx.fillRect(x-RACK_W/2,y-6,RACK_W,6);
  cx.globalAlpha=0.3;cx.fillStyle=col;cx.fillRect(x-RACK_W/2,y,RACK_W,RACK_H*0.3);
  cx.globalAlpha=1;
  // Label
  cx.fillStyle='#333';cx.font='bold 14px sans-serif';cx.textAlign='center';
  cx.fillText(name,x,y-10);cx.textAlign='left';
}

function drawMannequin(x,y){
  // Simple mannequin silhouette
  cx.fillStyle='#c8a060';
  // Body
  cx.fillRect(x-8,y-80,16,50);
  // Head
  cx.beginPath();cx.arc(x,y-90,9,0,Math.PI*2);cx.fill();
  // Dress
  cx.fillStyle='#c060a0';
  cx.beginPath();cx.moveTo(x-10,y-50);cx.lineTo(x+10,y-50);cx.lineTo(x+18,y-15);cx.lineTo(x-18,y-15);cx.closePath();cx.fill();
  // Sparkle
  cx.fillStyle='#f0c040';cx.font='15px sans-serif';
  cx.fillText('✨',x+6,y-40);
}

function drawItems(){
  for(const item of items){
    if(item.carriedBy!=null&&item.carriedBy!=='mia'&&item.carriedBy!=='weib')continue;
    if(item.carriedBy==='weib')continue; // drawn with weibergruppe
    if(item.carriedBy==='mia')continue; // drawn with mia
    if(isActionable(item.x)){
      drawGlowHalo(item.x,item.y+10,28);
    }
    // Always use origCol — colour NEVER changes
    const _drawCol=item.origCol||item.col||RACK_COLS[item.rack];
    drawItem(item.x,item.hanging?item.y:item.y,_drawCol,item.misplaced);
  }
}

function drawItem(x,y,col,mis){
  // Hanger
  cx.strokeStyle='#888';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(x,y);cx.arc(x,y+3,5,Math.PI*1.5,Math.PI*0.5,false);cx.stroke();
  // Garment — always original colour, no tinting
  cx.fillStyle=col;cx.globalAlpha=0.88;
  cx.fillRect(x-8,y+3,16,18);
  cx.globalAlpha=1;
  // Shine
  cx.fillStyle='rgba(255,255,255,0.3)';cx.fillRect(x-5,y+5,5,6);
  // Misplaced: red border only (no fill change)
  if(mis){
    cx.strokeStyle='#e00';cx.lineWidth=2;
    cx.strokeRect(x-8,y+3,16,18);
    // Small ! badge
    cx.fillStyle='#e00';cx.font='bold 13px sans-serif';cx.textAlign='center';
    cx.fillText('!',x+10,y+3);cx.textAlign='left';
  }
}

function drawPackages(){
  for(const pkg of packages){
    if(pkg.opened)continue;
    if(isActionable(pkg.x)){
      drawGlowHalo(pkg.x,pkg.y-14,38);
    }
    cx.fillStyle='#c8a050';cx.fillRect(pkg.x-18,pkg.y-28,36,28);
    cx.strokeStyle='#8b6914';cx.lineWidth=2;cx.strokeRect(pkg.x-18,pkg.y-28,36,28);
    // Ribbon
    cx.strokeStyle='#e03060';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(pkg.x,pkg.y-28);cx.lineTo(pkg.x,pkg.y);cx.stroke();
    cx.beginPath();cx.moveTo(pkg.x-18,pkg.y-14);cx.lineTo(pkg.x+18,pkg.y-14);cx.stroke();
    cx.font='15px sans-serif';cx.textAlign='center';
    cx.fillText('📦',pkg.x,pkg.y-8);cx.textAlign='left';
  }
}

function drawActors(){
  for(const a of actors){
    if(isActionable(a.x)){
      drawGlowHalo(a.x,a.y-30,44);
    }
    if(a.type===ACT.WEIBERGRUPPE)drawWeibergruppe(a);
    else if(a.type===ACT.STAMMKUNDIN)drawStammkundin(a);
    else if(a.type===ACT.POSTBOTE)drawPostbote(a);
    else if(a.type===ACT.MANAGEMENT)drawManagement(a);
  }
}

function drawWeibergruppe(a){
  const memberItems=a.memberItems||[];
  a.members.forEach((m,i)=>{
    const x=a.x+m.dx;
    // Draw person first
    drawPerson(x,a.y,['#e8a0b8','#b0d8f0','#b8e8b0'][i],a.dir,'W',14+i*2);
    // Draw item IN FRONT (after person so it overlaps)
    const iid=memberItems[i];
    if(iid){
      const itm=items.find(ii=>ii.id===iid&&ii.carriedBy==='weib');
      if(itm){
        // Draw bigger, centred on person (not offset to shoulder) so it's visible
        const sx=x,sy=a.y-42;
        cx.strokeStyle='#ccc';cx.lineWidth=2;
        cx.beginPath();cx.moveTo(sx,sy-6);cx.arc(sx,sy-2,6,Math.PI*1.5,Math.PI*0.5,false);cx.stroke();
        cx.fillStyle=itm.col;cx.globalAlpha=0.95;
        cx.fillRect(sx-11,sy-2,22,26);
        cx.fillRect(sx-15,sy,8,10);cx.fillRect(sx+7,sy,8,10);
        cx.globalAlpha=1;
        cx.fillStyle='rgba(255,255,255,0.3)';cx.fillRect(sx-8,sy+2,7,8);
      }
    }
    // speech bubble
    if(a.state==='chaos'&&frame%40<20&&i===1){
      drawBubble(x,a.y-90,'🗣️ Schnatter!',80);
    }
  });
}

function drawCarriedItem(x,y,dir,col){
  // Match Tiffany's carry style exactly
  const sx=x+(dir>0?-16:16), sy=y-52;
  // Hanger hook
  cx.strokeStyle='#aaa';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(sx,sy-4);cx.arc(sx,sy-1,5,Math.PI*1.5,Math.PI*0.5,false);cx.stroke();
  // Garment rect
  cx.fillStyle=col;cx.globalAlpha=0.92;
  cx.fillRect(sx-9,sy-1,18,20);
  // Sleeve nubs
  cx.fillRect(sx-13,sy,6,8);cx.fillRect(sx+7,sy,6,8);
  cx.globalAlpha=1;
  // Shine
  cx.fillStyle='rgba(255,255,255,0.35)';cx.fillRect(sx-6,sy+2,5,7);
}

function drawStammkundin(a){
  drawPerson(a.x,a.y,a.col,a.dir,a.name[0],16);
  if(a.state==='waiting'&&frame%30<15){
    const wait=Math.floor(a.waitAtCounter/60);
    drawBubble(a.x,a.y-70,'⏱️ '+wait+'s…',70);
  }
  // Draw carried items over shoulder
  if(a.items.length>0){
    for(let ci=0;ci<Math.min(a.items.length,3);ci++){
      const itm=items.find(i=>i.id===a.items[ci]);
      if(!itm)continue; // item already sold/removed — don't draw
      const col=itm.origCol||itm.col||RACK_COLS[itm.rack];
      const ox=ci*(a.dir>0?8:-8);
      drawCarriedItem(a.x+ox,a.y,a.dir,col);
    }
  }
}

function drawPostbote(a){
  drawPerson(a.x,a.y,'#d4a040',a.dir,'P',15);
  // Package on head — only before delivery
  if(a.state==='enter'||a.state==='deliver'){

// ── Game music (WebAudio, loopahead scheduler) ──────────────────────────
let _ac=null,_musicOn=false,_nextBeat=0,_beatCount=0;

function getAC(){
  if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();
  return _ac;
}

function playTone(freq,t,dur,vol,type){
  const a=getAC();
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'square';o.frequency.value=freq;
  o.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.85);
  o.start(t);o.stop(t+dur);
}

function playKick(t){
  const a=getAC();
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(160,t);
  o.frequency.exponentialRampToValueAtTime(40,t+0.15);
  o.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(0.6,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
  o.start(t);o.stop(t+0.22);
}

function playSnare(t){
  const a=getAC();
  const buf=a.createBuffer(1,Math.floor(a.sampleRate*0.15),a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.05));
  const src=a.createBufferSource();src.buffer=buf;
  const hp=a.createBiquadFilter();hp.type='highpass';hp.frequency.value=800;
  const g=a.createGain();
  src.connect(hp);hp.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(0.35,t);
  src.start(t);
}

function playHat(t,vol){
  const a=getAC();
  const buf=a.createBuffer(1,Math.floor(a.sampleRate*0.05),a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.02));
  const src=a.createBufferSource();src.buffer=buf;
  const hp=a.createBiquadFilter();hp.type='highpass';hp.frequency.value=5000;
  const g=a.createGain();
  src.connect(hp);hp.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(vol||0.12,t);
  src.start(t);
}

// 140 BPM → quarter = 60/140 = 0.4286s, eighth = 0.2143s
const BPM=140, QBEAT=60/BPM, EBEAT=QBEAT/2;

// Melody pattern (8 quarter beats = 2 bars)
const MEL=[
  [523,0],[659,1],[784,2],[659,3],
  [523,4],[698,5],[880,6],[784,7]
];
const BASS_PAT=[
  [130,0],[0,1],[174,2],[0,3],
  [146,4],[0,5],[110,6],[0,7]
];

function scheduleBeat(bar){
  if(!_musicOn)return;
  const a=getAC();
  const t0=_nextBeat;

  // Melody (8 quarter beats)
  MEL.forEach(([f,step])=>{ if(f>0) playTone(f,t0+step*QBEAT,QBEAT*0.7,0.10,'square'); });
  // Octave up accent
  [0,4].forEach(step=>{ const f=MEL[step][0]; if(f) playTone(f*2,t0+step*QBEAT+EBEAT,EBEAT*0.6,0.05,'sine'); });

  // Bass
  BASS_PAT.forEach(([f,step])=>{ if(f>0) playTone(f,t0+step*QBEAT,QBEAT*0.8,0.28,'triangle'); });

  // Drums across 8 quarter beats (= 16 eighths)
  for(let e=0;e<16;e++){
    const et=t0+e*EBEAT;
    // Kick: 1, 3, 5, 7 (quarters 0,2,4,6 in eighths = 0,4,8,12)
    if(e===0||e===4||e===8||e===12) playKick(et);
    // Snare: 2, 4 (quarters 1,3 in eighths = 2,6,10,14)  
    if(e===2||e===6||e===10||e===14) playSnare(et);
    // Hihat every 8th
    playHat(et,e%2===0?0.14:0.08);
  }

  // Fun extra: a little glitter trill on beat 4+8
  playTone(1047,t0+3*QBEAT,0.1,0.06,'sine');
  playTone(1175,t0+7*QBEAT,0.1,0.06,'sine');

  _nextBeat+=8*QBEAT;
}

function musicTick(){
  if(!_musicOn)return;
  const a=getAC();
  // Schedule ahead 0.3s
  while(_nextBeat<a.currentTime+0.5) scheduleBeat(_beatCount++);
  setTimeout(musicTick,100);
}

function startMusic(){if(!_musicEnabled)return;
  if(_musicOn)return;
  const a=getAC();
  if(a.state==='suspended')a.resume();
  _musicOn=true;
  _nextBeat=a.currentTime+0.05;
  _beatCount=0;
  musicTick();
}

function stopMusic(){_musicOn=false;}

function quitGame(){

function soundDingDong(){
  if(!_sfxEnabled)return;
  try{
    const a=getSfxAC(); const t=a.currentTime;
    function bell(freq,when,dur,vol){
      const o=a.createOscillator(),g=a.createGain();
      o.type='sine';o.frequency.value=freq;
      o.connect(g);g.connect(a.destination);
      g.gain.setValueAtTime(0,when);
      g.gain.linearRampToValueAtTime(vol,when+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,when+dur);
      o.start(when);o.stop(when+dur+0.05);
      const o2=a.createOscillator(),g2=a.createGain();
      o2.type='sine';o2.frequency.value=freq*2.756;
      o2.connect(g2);g2.connect(a.destination);
      g2.gain.setValueAtTime(0,when);
      g2.gain.linearRampToValueAtTime(vol*0.25,when+0.01);
      g2.gain.exponentialRampToValueAtTime(0.001,when+dur*0.4);
      o2.start(when);o2.stop(when+dur);
    }
    bell(880,t,0.9,0.3);
    bell(698,t+0.5,1.0,0.25);
  }catch(e){console.warn('dingdong',e);}
}

function soundKaChing(){
  if(!_sfxEnabled)return;
  try{
    const a=getSfxAC(); const t=a.currentTime;
    // Mechanical clunk
    const buf=a.createBuffer(1,Math.floor(a.sampleRate*0.1),a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.018));
    const src=a.createBufferSource();src.buffer=buf;
    const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;
    const gKa=a.createGain();gKa.gain.value=0.7;
    src.connect(lp);lp.connect(gKa);gKa.connect(a.destination);
    src.start(t);
    // Bright metallic "ching"
    function ching(freq,when,dur,vol){
      const o=a.createOscillator(),g=a.createGain();
      o.type='triangle';o.frequency.value=freq;
      o.connect(g);g.connect(a.destination);
      g.gain.setValueAtTime(vol,when);
      g.gain.exponentialRampToValueAtTime(0.001,when+dur);
      o.start(when);o.stop(when+dur+0.02);
    }
    ching(1760,t+0.07,0.5,0.4);
    ching(2217,t+0.09,0.4,0.3);
    ching(2637,t+0.11,0.35,0.2);
    ching(3136,t+0.13,0.3,0.15);
    // Coin tinkle
    for(let i=0;i<5;i++) ching(1400+i*200,t+0.07+i*0.025,0.2,0.08);
  }catch(e){console.warn('kaching',e);}
}

function startGame(){
  state=ST.PLAY;
  score=0;level=1;frame=0;shakeT=0;
  actors=[];packages=[];
  spawnTimer=500;spawnMin=400;spawnMax=700;
  initItems();
  uiScore();uiLevel();
  startMusic();
  msg('✨ Willkommen bei Tredy! 👆 Tippe auf alles was Aufmerksamkeit braucht!',200);
  document.getElementById('splash').style.display='none';
}

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-start').addEventListener('touchend',e=>{e.preventDefault();startGame();});

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}
requestAnimationFrame(loop);
</script>
